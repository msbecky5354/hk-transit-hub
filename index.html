<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="appName"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="lang.js?v=62"></script>
    <script src="config.js?v=62"></script>
    <script src="header.js"></script>
    <script src="footer.js"></script>
    <script src="data-static.js?v=62"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        .group-container { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 12px; }
        .eta-card { touch-action: pan-y; }
        .swipe-to-delete { overflow: hidden; position: relative; }
        .swipe-content { transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); position: relative; z-index: 10; background: white; width: 100%; height: 100%; }
        .delete-btn-bg { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background-color: #ef4444; color: white; display: flex; align-items: center; justify-content: center; z-index: 1; border-top-right-radius: 0.75rem; border-bottom-right-radius: 0.75rem; }
    </style>
</head>
<body class="bg-white font-sans text-gray-800 antialiased min-h-screen pb-24 overflow-x-hidden">
    <div id="app-header"></div>

    <main class="max-w-lg mx-auto mt-4 px-4 w-full">
        <div id="empty-state" class="hidden flex flex-col items-center justify-center pt-20 pb-10 text-center">
            <img src="https://cdn-icons-png.flaticon.com/512/7268/7268800.png" alt="Empty" class="w-24 h-24 mb-4 opacity-50 grayscale mix-blend-multiply">
            <h2 class="text-lg font-bold text-gray-600 mb-2" data-i18n="emptyDesc">尚未設定任何路線</h2>
            <button onclick="window.location.href='setup.html'" class="mt-4 bg-[#B8860B] text-white font-bold py-2.5 px-6 rounded-full shadow-md hover:bg-yellow-700 transition active:scale-95" data-i18n="goToSetupBtn">
                + 新增路線
            </button>
        </div>

        <div id="dashboard-content" class="w-full"></div>
    </main>

    <div id="app-footer"></div>

    <script>
        let refreshIntervalId = null;

        window.onload = () => {
            if (typeof renderHeader === "function") renderHeader();
            if (typeof renderFooter === "function") renderFooter();
            initDashboard();
            startAutoRefresh();
        };

        function getRefreshRate() {
            return parseInt(localStorage.getItem('transit_refresh_rate')) || 30; 
        }

        function startAutoRefresh() {
            if (refreshIntervalId) clearInterval(refreshIntervalId);
            const rate = getRefreshRate() * 1000;
            refreshIntervalId = setInterval(() => {
                refreshAllETAs();
            }, rate);
        }

        // 👇 一鍵刪除群組功能
        window.deleteGroup = function(groupName) {
            const displayGroupName = typeof getTranslation === 'function' ? getTranslation(groupName, groupName) : groupName;
            
            let confirmMsg = typeof getTranslation === 'function' 
                ? getTranslation('deleteGroupConfirm', `⚠️ 確定要刪除整個群組「{group}」及裡面所有的路線嗎？\n\n此動作無法復原！`) 
                : `⚠️ 確定要刪除整個群組「${displayGroupName}」及裡面所有的路線嗎？\n\n此動作無法復原！`;
                
            confirmMsg = confirmMsg.replace('{group}', displayGroupName);

            if (confirm(confirmMsg)) {
                let routes = JSON.parse(localStorage.getItem('hk_transit_routes') || '[]');
                routes = routes.filter(route => route.group !== groupName);
                localStorage.setItem('hk_transit_routes', JSON.stringify(routes));
                initDashboard(); 
            }
        };

        function initDashboard() {
            const container = document.getElementById('dashboard-content');
            const emptyState = document.getElementById('empty-state');
            
            let routes = JSON.parse(localStorage.getItem('hk_transit_routes') || '[]');
            let savedGroupOrder = JSON.parse(localStorage.getItem('hk_transit_group_order') || 'null');

            if (routes.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            const groupedData = routes.reduce((acc, route) => {
                if (!acc[route.group]) acc[route.group] = [];
                acc[route.group].push(route);
                return acc;
            }, {});

            let activeGroups = Object.keys(groupedData);
            if (savedGroupOrder && Array.isArray(savedGroupOrder)) {
                activeGroups = savedGroupOrder.filter(g => groupedData[g]);
                const missingGroups = Object.keys(groupedData).filter(g => !savedGroupOrder.includes(g));
                activeGroups = activeGroups.concat(missingGroups);
            }

            renderDashboard(groupedData, activeGroups);
            refreshAllETAs();

            // 👇 幫 Group 加入 filter: 'button' 防止誤觸拖曳
            new Sortable(document.getElementById('dashboard-content'), {
                animation: 150,
                handle: '.group-header',
                filter: 'button', // 防止撳垃圾桶嗰陣觸發拖曳！
                onEnd: function (evt) { saveGroupOrder(); }
            });
        }

        function renderDashboard(groupedData, groupOrder) {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = '';

            groupOrder.forEach((group, index) => {
                if (!groupedData[group]) return;

                const displayGroupName = typeof getTranslation === 'function' ? getTranslation(group, group) : group;

                // 👇 喺 header 旁邊加咗垃圾桶 button
                let groupHtml = `
                    <div class="group-container mb-6" data-group="${group}">
                        <div class="flex items-center justify-between mb-3 px-1 group-header cursor-move touch-none">
                            <h2 class="text-[15px] font-black text-gray-800 tracking-wide flex items-center gap-2">
                                <span class="text-gray-400 text-sm"><i class="fas fa-grip-vertical"></i></span>
                                ${displayGroupName}
                            </h2>
                            <button onclick="deleteGroup('${group.replace(/'/g, "\\'")}')" class="text-gray-300 hover:text-red-500 transition px-2 py-1 active:scale-90 touch-auto" title="刪除群組">
                                <i class="fas fa-trash-can"></i>
                            </button>
                        </div>
                        <div class="space-y-3 route-list" id="list-${index}">
                `;

                groupedData[group].forEach(route => {
                    groupHtml += generateRouteCard(route);
                });

                groupHtml += `
                        </div>
                    </div>
                `;
                container.innerHTML += groupHtml;
            });

            setupSwipeToDelete();
            setupSortableForGroups();
            if (typeof translatePage === 'function') translatePage();
        }

        function saveGroupOrder() {
            const container = document.getElementById('dashboard-content');
            const groups = Array.from(container.children).map(el => el.getAttribute('data-group'));
            localStorage.setItem('hk_transit_group_order', JSON.stringify(groups));
        }

        function setupSortableForGroups() {
            document.querySelectorAll('.route-list').forEach(list => {
                new Sortable(list, {
                    animation: 150,
                    handle: '.drag-handle',
                    group: 'shared', 
                    onEnd: function (evt) {
                        saveAllRoutesState();
                    }
                });
            });
        }

        function saveAllRoutesState() {
            const allContainers = document.querySelectorAll('.group-container');
            let updatedRoutes = [];
            
            allContainers.forEach(groupEl => {
                const groupName = groupEl.getAttribute('data-group');
                const cards = groupEl.querySelectorAll('.eta-card');
                
                cards.forEach(card => {
                    const id = card.getAttribute('data-id');
                    let routes = JSON.parse(localStorage.getItem('hk_transit_routes') || '[]');
                    const routeData = routes.find(r => r.id === id);
                    if(routeData) {
                        routeData.group = groupName;
                        updatedRoutes.push(routeData);
                    }
                });
            });

            localStorage.setItem('hk_transit_routes', JSON.stringify(updatedRoutes));
        }

        function generateRouteCard(route) {
            const alias = route.isCustomAlias ? route.alias : (typeof getTranslation === 'function' ? getTranslation(route.route_key, route.route) : route.route);
            let destText = route.dest_name?.tc || route.dest_key || "未知方向";
            if(route.transitType === 'LRT') destText = route.dest_key;
            
            const destLabel = (typeof currentLang !== 'undefined' && currentLang === 'en') ? 'To ' : '往 ';
            let stopName = typeof getTranslation === 'function' ? getTranslation(route.stop_key, route.stop_name?.tc || route.stop_id) : (route.stop_name?.tc || route.stop_id);
            if (['MTR', 'LRT'].includes(route.transitType) && window.STATIC_DICTIONARY && window.STATIC_DICTIONARY[route.route_key]) {
                const stops = window.STATIC_DICTIONARY[route.route_key].directions[Object.keys(window.STATIC_DICTIONARY[route.route_key].directions)[0]].stops;
                const stopData = stops.find(s => s.stop_id === route.stop_id);
                if (stopData && stopData.name_key) stopName = typeof getTranslation === 'function' ? getTranslation(stopData.name_key, stopName) : stopName;
            }

            let transitLogoHtml = '';
            if (route.transitType === 'MTR') {
                transitLogoHtml = `<div class="w-8 h-8 rounded-full bg-yellow-50 flex items-center justify-center mr-2.5 shrink-0"><img src="MTR.png" class="h-6 object-contain mix-blend-multiply"></div>`;
            } else if (route.transitType === 'BUS' || route.transitType === 'KMB' || route.transitType === 'CTB' || route.transitType === 'NLB' || route.transitType === 'LWB') {
                transitLogoHtml = `<div class="w-8 h-8 rounded-full bg-red-50 flex items-center justify-center mr-2.5 shrink-0"><img src="BUS.png" class="h-5 object-contain mix-blend-multiply"></div>`;
            } else if (route.transitType === 'GMB') {
                transitLogoHtml = `<div class="w-8 h-8 rounded-full bg-green-50 flex items-center justify-center mr-2.5 shrink-0"><img src="MINIBUS.png" class="h-5 object-contain mix-blend-multiply"></div>`;
            } else if (route.transitType === 'LRT') {
                transitLogoHtml = `<div class="w-8 h-8 rounded-full bg-orange-50 flex items-center justify-center mr-2.5 shrink-0"><i class="fas fa-train-tram text-orange-500"></i></div>`;
            }

            return `
                <div class="swipe-to-delete rounded-xl shadow-sm border border-gray-100 bg-white eta-card" data-id="${route.id}">
                    <div class="delete-btn-bg text-sm font-bold shadow-inner">
                        <div class="flex flex-col items-center">
                            <i class="fas fa-trash mb-1 text-lg"></i>
                            刪除
                        </div>
                    </div>
                    <div class="swipe-content p-4 flex justify-between items-center rounded-xl border-l-4" style="border-left-color: ${route.color}">
                        <div class="flex-1 min-w-0 pr-3 flex items-center">
                            ${transitLogoHtml}
                            <div class="flex-1 min-w-0">
                                <div class="flex items-baseline gap-2 mb-0.5">
                                    <h3 class="text-[17px] font-black text-gray-800 tracking-tight truncate">${alias}</h3>
                                    <span class="text-[11px] font-medium text-gray-400 truncate tracking-wide">${destLabel}${destText}</span>
                                </div>
                                <div class="text-[12px] text-gray-500 truncate flex items-center gap-1.5">
                                    <i class="fas fa-location-dot text-gray-300"></i> ${stopName}
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-3 shrink-0">
                            <div class="text-right min-w-[65px]" id="eta-${route.id}">
                                <div class="w-5 h-5 border-2 border-${route.color.replace('#', 'bg-')}-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                            </div>
                            <div class="drag-handle text-gray-300 hover:text-gray-500 cursor-move px-2 py-2 touch-none">
                                <i class="fas fa-bars"></i>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function setupSwipeToDelete() {
            const cards = document.querySelectorAll('.swipe-to-delete');
            cards.forEach(card => {
                const swipeContent = card.querySelector('.swipe-content');
                const id = card.getAttribute('data-id');
                let startX = 0, currentX = 0, isDragging = false;
                const threshold = 60;

                swipeContent.addEventListener('touchstart', e => {
                    startX = e.touches[0].clientX;
                    isDragging = true;
                    swipeContent.style.transition = 'none';
                }, {passive: true});

                swipeContent.addEventListener('touchmove', e => {
                    if (!isDragging) return;
                    currentX = e.touches[0].clientX;
                    let diffX = currentX - startX;
                    if (diffX > 0) diffX = 0; 
                    if (diffX < -100) diffX = -100;
                    swipeContent.style.transform = `translateX(${diffX}px)`;
                }, {passive: true});

                swipeContent.addEventListener('touchend', e => {
                    if (!isDragging) return;
                    isDragging = false;
                    swipeContent.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                    
                    let diffX = currentX - startX;
                    if (diffX < -threshold) {
                        swipeContent.style.transform = `translateX(-100%)`;
                        setTimeout(() => deleteRoute(id), 300);
                    } else {
                        swipeContent.style.transform = `translateX(0)`;
                    }
                });
            });
        }

        function deleteRoute(id) {
            let routes = JSON.parse(localStorage.getItem('hk_transit_routes') || '[]');
            routes = routes.filter(r => r.id !== id);
            localStorage.setItem('hk_transit_routes', JSON.stringify(routes));
            initDashboard();
        }

        async function refreshAllETAs() {
            let routes = JSON.parse(localStorage.getItem('hk_transit_routes') || '[]');
            if (routes.length === 0) return;
            
            const btnEn = document.getElementById('btn-en');
            const isEnglish = btnEn && btnEn.classList.contains('text-[#B8860B]');

            const fetchPromises = routes.map(async (route) => {
                const etaContainer = document.getElementById(`eta-${route.id}`);
                if (!etaContainer) return;

                try {
                    let baseUrl = window.APP_CONFIG.N8N_BASE_URL.replace(/\/$/, '');
                    if (!baseUrl.endsWith('get-omni-eta')) baseUrl += '/get-omni-eta';
                    
                    let targetUrl = route.apiUrl;
                    if (route.transitType === 'GMB' && targetUrl.includes('rt.data.gov.hk')) {
                         targetUrl = targetUrl.replace('rt.data.gov.hk', 'data.etagmb.gov.hk');
                    }

                    const apiUrl = `${baseUrl}?url=${encodeURIComponent(targetUrl)}&type=${route.transitType}&route=${encodeURIComponent(route.route)}&dir=${encodeURIComponent(route.dest_key || '')}&v=${Date.now()}`;
                    
                    const response = await fetch(apiUrl, {
                        method: 'GET',
                        headers: { 'x-transit-token': window.APP_CONFIG.N8N_TOKEN, 'Accept': 'application/json' }
                    });

                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    
                    let etas = data.eta || [];
                    
                    if (route.transitType === 'MTR' && window.STATIC_DICTIONARY[route.route_key] && route.dest_key) {
                        const mtrCode = route.route_key; 
                        const dirKey = route.dest_key; 
                        
                        if (data.data && data.data[`${route.stop_id}-${mtrCode}`]) {
                             const dirData = data.data[`${route.stop_id}-${mtrCode}`][dirKey];
                             if(dirData && Array.isArray(dirData)) {
                                 etas = dirData.map(item => ({
                                     etaTime: item.time,
                                     isLeaving: false,
                                     remark: item.plat ? `Plat ${item.plat}` : ""
                                 }));
                             }
                        }
                    }

                    if (etas.length > 0) {
                        const nextEta = etas[0];
                        if (nextEta.isLeaving) {
                             etaContainer.innerHTML = `<div class="text-[17px] font-black text-${route.color.replace('#', 'bg-')}-600 tracking-tight leading-none">${isEnglish ? 'Departing' : '即將抵達'}</div>`;
                        } else {
                            const now = new Date();
                            const target = new Date(nextEta.etaTime);
                            const diffMs = target - now;
                            let diffMins = Math.floor(diffMs / 60000);
                            
                            if (diffMins <= 0) {
                                etaContainer.innerHTML = `<div class="text-[17px] font-black text-${route.color.replace('#', 'bg-')}-600 tracking-tight leading-none">${isEnglish ? 'Arriving' : '即將抵達'}</div>`;
                            } else {
                                etaContainer.innerHTML = `
                                    <div class="text-[26px] font-black text-${route.color.replace('#', 'bg-')}-600 tracking-tighter leading-none">${diffMins}</div>
                                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">${isEnglish ? 'MINS' : '分鐘'}</div>
                                `;
                            }
                        }
                    } else {
                        etaContainer.innerHTML = `<div class="text-[13px] font-bold text-gray-400 leading-tight">${isEnglish ? 'No Service' : '暫無班次'}</div>`;
                    }
                } catch (e) {
                    etaContainer.innerHTML = `<div class="text-[12px] font-bold text-red-400"><i class="fas fa-wifi"></i></div>`;
                }
            });

            await Promise.all(fetchPromises);
        }
    </script>
</body>
</html>
