<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="appName">貼地通 - 儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="lang.js?v=14"></script>
    <script src="config.js?v=14"></script>
    <script src="header.js"></script>
    <script src="footer.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { overscroll-behavior-y: none; }
        .swipe-container { position: relative; overflow: hidden; border-radius: 0.5rem; margin-bottom: 0.75rem; }
        .swipe-content { position: relative; z-index: 10; background: white; transition: transform 0.2s ease-out; touch-action: pan-y; }
        .swipe-actions { position: absolute; top: 0; right: 0; bottom: 0; width: 80px; background-color: #ef4444; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 1; }
        .drag-handle { cursor: grab; touch-action: none; }
        .drag-handle:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.4; background-color: #f3f4f6; }
        .group-block { transition: all 0.2s; }
        .group-title { cursor: grab; }
        .group-title:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans pb-24">
    <div id="app-header"></div>
    <main id="dashboard-container" class="flex-1 p-4 overflow-y-auto space-y-6">
        <div id="empty-state" class="hidden flex flex-col items-center justify-center h-64 text-gray-400">
            <i class="fas fa-route text-4xl mb-3 text-gray-300"></i>
            <p data-i18n="emptyDesc">尚未設定任何路線</p>
            <button onclick="window.location.href='setup.html'" class="mt-4 bg-red-600 text-white px-6 py-2 rounded-full shadow-md font-bold" data-i18n="goToSetupBtn">+ 新增路線</button>
        </div>
    </main>
    <div id="app-footer"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof renderHeader === "function") renderHeader();
            if (typeof renderFooter === "function") renderFooter();
            autoHealRoutes();
            initDashboard();
        });

        function autoHealRoutes() {
            let routesStr = localStorage.getItem('hk_transit_routes');
            if (!routesStr) return;
            let routes = JSON.parse(routesStr);
            let changed = false;
            
            let filteredRoutes = routes.filter(r => {
                if (r.transitType === 'TRAM') { changed = true; return false; }
                return true;
            });

            filteredRoutes.forEach(r => {
                if (r.transitType === 'MTR' && r.apiUrl && (r.apiUrl.includes('-OUTBOUND') || r.apiUrl.includes('-INBOUND'))) {
                    try {
                        let urlObj = new URL(r.apiUrl);
                        let sta = urlObj.searchParams.get('sta');
                        if (sta && sta.includes('-OUTBOUND')) {
                            urlObj.searchParams.set('sta', sta.replace('-OUTBOUND', ''));
                            urlObj.searchParams.set('dir', 'UP');
                            r.apiUrl = urlObj.toString();
                            changed = true;
                        } else if (sta && sta.includes('-INBOUND')) {
                            urlObj.searchParams.set('sta', sta.replace('-INBOUND', ''));
                            urlObj.searchParams.set('dir', 'DOWN');
                            r.apiUrl = urlObj.toString();
                            changed = true;
                        }
                    } catch(e) {}
                }
            });
            
            if (changed) { localStorage.setItem('hk_transit_routes', JSON.stringify(filteredRoutes)); }
        }

        function getTranslation(key, defaultText) {
            return (langDict[currentLang] && langDict[currentLang][key]) ? langDict[currentLang][key] : (defaultText || key);
        }

        function getRoutes() {
            let routesStr = localStorage.getItem('hk_transit_routes');
            let routes = [];
            if (!routesStr) return [];
            routes = JSON.parse(routesStr);
            let needSave = false;
            routes = routes.map(r => {
                if (r.group === "🏠 屋企落樓" || r.group === "🏠 屋企落楼" || r.group === "🏠 Home") { r.group = "groupHome"; needSave = true; }
                if (r.group === "💼 返工轉車" || r.group === "💼 返工转车" || r.group === "💼 Commute") { r.group = "groupWork"; needSave = true; }
                return r;
            });
            if (needSave) localStorage.setItem('hk_transit_routes', JSON.stringify(routes));
            return routes;
        }

        function saveRoutes(routes) { localStorage.setItem('hk_transit_routes', JSON.stringify(routes)); }

        function getTransitDisplayHtml(transitType) {
            const iconMap = {
                'KMB': '<i class="fas fa-bus text-red-500 mr-1"></i>',
                'CITYBUS': '<i class="fas fa-bus text-yellow-500 mr-1"></i>',
                'CTB': '<i class="fas fa-bus text-yellow-500 mr-1"></i>',
                'MTR': '<i class="fas fa-subway text-teal-600 mr-1"></i>',
                'LRT': '<i class="fas fa-train-tram text-orange-500 mr-1"></i>',
                'FERRY': '<i class="fas fa-ship text-blue-600 mr-1"></i>',
                'NLB': '<i class="fas fa-bus-simple text-blue-500 mr-1"></i>',
                'GMB': '<i class="fas fa-van-shuttle text-green-500 mr-1"></i>'
            };
            const langKeyMap = {
                'KMB': 'transitKMB', 'CITYBUS': 'transitCTB', 'CTB': 'transitCTB',
                'MTR': 'transitMTR', 'LRT': 'transitLRT',
                'FERRY': 'transitFERRY', 'NLB': 'transitNLB', 'GMB': 'transitGMB'
            };
            const icon = iconMap[transitType] || '<i class="fas fa-route mr-1"></i>';
            const localizedName = getTranslation(langKeyMap[transitType], transitType);
            return `${icon}${localizedName}`;
        }

        function initDashboard() {
            const container = document.getElementById('dashboard-container');
            const emptyState = document.getElementById('empty-state');
            const filteredRoutes = getRoutes(); 

            container.innerHTML = '';
            if (filteredRoutes.length === 0) {
                container.appendChild(emptyState);
                emptyState.classList.remove('hidden');
                return;
            }

            const grouped = filteredRoutes.reduce((acc, route) => {
                if (!acc[route.group]) acc[route.group] = [];
                acc[route.group].push(route);
                return acc;
            }, {});

            const savedGroupOrder = JSON.parse(localStorage.getItem('hk_transit_group_order') || '[]');
            const sortedGroupNames = Object.keys(grouped).sort((a, b) => {
                const idxA = savedGroupOrder.indexOf(a);
                const idxB = savedGroupOrder.indexOf(b);
                if (idxA === -1 && idxB === -1) return 0;
                if (idxA === -1) return 1;
                if (idxB === -1) return -1;
                return idxA - idxB;
            });

            sortedGroupNames.forEach(groupName => {
                const routes = grouped[groupName];
                const displayGroupName = (groupName === 'groupWork' || groupName === 'groupHome') ? getTranslation(groupName, groupName) : groupName;
                const groupDiv = document.createElement('div');
                groupDiv.className = 'group-block mb-6 bg-white rounded-xl shadow-sm p-4 border border-gray-100';
                groupDiv.dataset.groupName = groupName;
                groupDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-3 pb-2 border-b border-gray-50">
                        <h2 class="group-title text-md font-bold text-gray-700 uppercase tracking-wider flex items-center gap-1">
                            <span>☰</span> <span>${displayGroupName}</span>
                        </h2>
                    </div>
                `;
                const listDiv = document.createElement('div');
                listDiv.className = 'sortable-list space-y-3';
                listDiv.dataset.group = groupName;

                routes.forEach(route => { listDiv.appendChild(createRouteCard(route)); });

                groupDiv.appendChild(listDiv);
                container.appendChild(groupDiv);

                new Sortable(listDiv, {
                    handle: '.drag-handle', animation: 150, ghostClass: 'sortable-ghost',
                    onEnd: function () { updateSorting(); }
                });
            });

            new Sortable(container, {
                draggable: '.group-block', handle: '.group-title', animation: 150, ghostClass: 'sortable-ghost',
                onEnd: function () { updateGroupSorting(); }
            });

            translatePage(); 
            initSwipeToDelete();
            fetchAllETAs();
        }

        function createRouteCard(route) {
            const wrapper = document.createElement('div');
            wrapper.className = 'swipe-container shadow-sm';
            wrapper.dataset.id = route.id;
            const loadingText = getTranslation('loading', '載入中...');
            
            // 1. 獲取站名同原始終點名
            const getDynamicName = (nameObj) => {
                if (!nameObj) return '';
                if (typeof nameObj === 'string') return nameObj;
                return nameObj[currentLang] || nameObj['tc'] || '';
            };
            const stopName = route.stop_key ? getTranslation(route.stop_key) : getDynamicName(route.stop_name);
            const rawDestName = route.dest_key ? getTranslation(route.dest_key) : getDynamicName(route.dest_name);
            
            // 2. 智能清洗終點站名 (切走政府 API 冗餘字眼如 "[城巴] A21 往")
            let cleanDestName = rawDestName;
            if (cleanDestName.includes('往 ')) {
                cleanDestName = cleanDestName.split('往 ').pop().trim();
            } else if (cleanDestName.toLowerCase().includes(' to ')) {
                cleanDestName = cleanDestName.split(/ to /i).pop().trim();
            }
            
            // 3. 完美組裝「上車站名 往 方向」
            const toWord = currentLang === 'en' ? ' To ' : ' 往 ';
            const directionStr = cleanDestName ? `${stopName}${toWord}${cleanDestName}` : stopName;

            // 4. 處理「自訂花名 (Alias)」嘅雙層顯示
            let mainTitle = directionStr;
            let subTitleHtml = '';
            
            if (route.isCustomAlias && route.alias && route.alias.trim() !== '') {
                // 如果有花名：主標題顯示花名，副標題顯示「站名 往 方向」
                mainTitle = route.alias; 
                subTitleHtml = `<div class="text-[11px] text-gray-500 truncate mt-0.5">${directionStr}</div>`;
            }
            
            if (!mainTitle) mainTitle = route.route || "Transit Route";

            // 5. 左側精簡 Badge 處理 (解決被擠壓出 ... 嘅痛點)
            let shortRouteName = route.route || '';
            if (route.transitType === 'LRT' && shortRouteName.startsWith('LRT-')) shortRouteName = shortRouteName.replace('LRT-', '');
            if (route.transitType === 'FERRY' && shortRouteName.startsWith('FERRY-')) shortRouteName = shortRouteName.replace('FERRY-', '');
            if (route.transitType === 'MTR') {
                const mtrShort = {
                   'TML': currentLang==='en'?'TML':'屯馬', 'TCL': currentLang==='en'?'TCL':'東涌',
                   'KTL': currentLang==='en'?'KTL':'觀塘', 'TWL': currentLang==='en'?'TWL':'荃灣',
                   'ISL': currentLang==='en'?'ISL':'港島', 'EAL': currentLang==='en'?'EAL':'東鐵',
                   'SIL': currentLang==='en'?'SIL':'南港', 'TKL': currentLang==='en'?'TKL':'將軍澳',
                   'AEL': currentLang==='en'?'AEL':'機快', 'DRL': currentLang==='en'?'DRL':'迪士尼'
                };
                shortRouteName = mtrShort[shortRouteName] || shortRouteName;
            }

            const transitDisplay = getTransitDisplayHtml(route.transitType);

            wrapper.innerHTML = `
                <div class="swipe-actions cursor-pointer hover:bg-red-700 transition" onclick="deleteRoute('${route.id}')">
                    <i class="fas fa-trash-alt text-xl"></i>
                </div>
                <div class="swipe-content border-l-4 bg-white flex items-center p-4 rounded-r-lg" style="border-color: ${route.color}">
                    <div class="w-16 flex flex-col items-center justify-center border-r border-gray-100 pr-3 mr-3 text-center shrink-0">
                        <span class="text-[9px] text-gray-400 font-bold mb-1 flex items-center justify-center whitespace-nowrap">${transitDisplay}</span>
                        <span class="text-base font-black text-gray-800 truncate max-w-full">${shortRouteName}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="text-sm font-bold text-gray-800 truncate" title="${mainTitle}">${mainTitle}</h3>
                        ${subTitleHtml}
                        <div class="flex items-center mt-1.5 space-x-2 text-sm" id="eta-display-${route.id}">
                            <i class="fas fa-spinner fa-spin text-gray-300"></i>
                            <span class="text-gray-500">${loadingText}</span>
                        </div>
                    </div>
                    <div class="drag-handle pl-4 py-2 text-gray-300 hover:text-gray-500 transition">
                        <i class="fas fa-bars text-xl"></i>
                    </div>
                </div>
            `;
            return wrapper;
        }

        function deleteRoute(id) {
            let routes = getRoutes();
            routes = routes.filter(r => String(r.id) !== String(id));
            saveRoutes(routes);
            initDashboard();
        }

        function updateSorting() {
            const newOrderIds = Array.from(document.querySelectorAll('.swipe-container')).map(el => el.dataset.id);
            const currentRoutes = getRoutes();
            currentRoutes.sort((a, b) => newOrderIds.indexOf(a.id) - newOrderIds.indexOf(b.id));
            saveRoutes(currentRoutes);
        }

        function updateGroupSorting() {
            const groupElements = Array.from(document.querySelectorAll('.group-block'));
            const groupOrder = groupElements.map(el => el.dataset.groupName);
            localStorage.setItem('hk_transit_group_order', JSON.stringify(groupOrder));
        }

        function initSwipeToDelete() {
            const containers = document.querySelectorAll('.swipe-container');
            const threshold = Math.max(-window.innerWidth * 0.2, -80); 
            containers.forEach(container => {
                const content = container.querySelector('.swipe-content');
                let startX = 0, currentX = 0, isDragging = false;
                content.addEventListener('pointerdown', (e) => {
                    if (e.target.closest('.drag-handle') || e.target.closest('.swipe-actions')) return;
                    isDragging = true; startX = e.clientX; content.style.transition = 'none'; content.setPointerCapture(e.pointerId);
                });
                content.addEventListener('pointermove', (e) => {
                    if (!isDragging) return;
                    const deltaX = e.clientX - startX;
                    if (deltaX < 0 && deltaX > -150) { currentX = deltaX; content.style.transform = `translateX(${currentX}px)`; }
                });
                const endDrag = (e) => {
                    if (!isDragging) return;
                    isDragging = false; content.style.transition = 'transform 0.2s ease-out'; content.releasePointerCapture(e.pointerId);
                    if (currentX < threshold) { content.style.transform = `translateX(-100%)`; setTimeout(() => deleteRoute(container.dataset.id), 200); }
                    else { content.style.transform = 'translateX(0)'; }
                    currentX = 0;
                };
                content.addEventListener('pointerup', endDrag);
                content.addEventListener('pointercancel', endDrag);
            });
        }

        async function fetchAllETAs() {
            const routes = getRoutes();
            const now = Date.now();
            routes.forEach(async (route) => {
                if (!route.apiUrl || route.apiUrl === '#') return;
                const display = document.getElementById(`eta-display-${route.id}`);
                let etas = [];
                let directSuccess = false;
                try {
                    const response = await fetch(route.apiUrl, { method: 'GET', headers: { "Accept": "application/json" } });
                    if (response.ok) {
                        const text = await response.text();
                        if (text && text.trim().length > 0) {
                            const json = JSON.parse(text);
                            etas = parseRawTrafficJson(route, json, now);
                            directSuccess = true;
                        }
                    }
                } catch (directError) {}

                if (!directSuccess) {
                    try {
                        const n8nEtaUrl = `${window.APP_CONFIG.N8N_BASE_URL}/get-eta?url=${encodeURIComponent(route.apiUrl)}`;
                        const response = await fetch(n8nEtaUrl, { method: 'GET', headers: { 'x-transit-token': window.APP_CONFIG.N8N_TOKEN } });
                        if (response.ok) {
                            const json = await response.json();
                            etas = parseRawTrafficJson(route, json, now);
                        }
                    } catch (bffError) {}
                }

                if (display) {
                    etas = etas.slice(0, 3).sort((a, b) => a - b);
                    if (etas.length > 0) {
                        const etaHtml = etas.map(min => {
                            let colorClass = min <= 5 ? "text-green-600" : (min <= 15 ? "text-orange-500" : "text-gray-800");
                            let timeText = min === 0 ? "即將抵達" : min;
                            let unit = min === 0 ? "" : `<span class="text-gray-500 text-xs ml-1">${getTranslation('minutes', '分鐘')}</span>`;
                            return `<span class="${colorClass} font-black text-xl">${timeText}</span>${unit}`;
                        }).join('<span class="text-gray-300 mx-2">|</span>');
                        display.innerHTML = etaHtml;
                    } else {
                        display.innerHTML = `<span class="text-gray-400 text-sm">${getTranslation('no_schedule', '暫無班次')}</span>`;
                    }
                }
            });
        }

        function parseRawTrafficJson(routeObj, json, now) {
            let etas = [];
            let transitType = routeObj.transitType;
            let apiUrl = routeObj.apiUrl;
            try {
                if (transitType === 'KMB' || transitType === 'CITYBUS' || transitType === 'CTB') {
                    if (json.data && Array.isArray(json.data)) {
                        etas = json.data.filter(item => item.eta).map(item => { return Math.max(0, Math.floor((new Date(item.eta).getTime() - now) / 60000)); });
                    }
                } else if (transitType === 'MTR') {
                    const urlObj = new URL(apiUrl);
                    const line = urlObj.searchParams.get('line'), dir = urlObj.searchParams.get('dir'), sta = urlObj.searchParams.get('sta');
                    const mtrKey = `${line}-${sta}`;
                    if (json.data && json.data[mtrKey] && json.data[mtrKey][dir]) {
                        etas = json.data[mtrKey][dir].filter(t => t.time).map(t => { return Math.max(0, Math.floor((new Date(t.time.replace(/-/g, '/')).getTime() - now) / 60000)); });
                    }
                } else if (transitType === 'FERRY') {
                    let etasRaw = [];
                    // Extract from nested route_list
                    if (json.data && json.data.route_list && Array.isArray(json.data.route_list)) {
                        json.data.route_list.forEach(route => {
                            if (route.stop_list && Array.isArray(route.stop_list)) {
                                route.stop_list.forEach(stop => {
                                    if (stop.departure_time) etasRaw.push(stop.departure_time);
                                    else if (stop.eta) etasRaw.push(stop.eta);
                                });
                            }
                        });
                    }
                    // Extract from flat data array (e.g. HKKF API)
                    let flatList = json.data || json;
                    if (Array.isArray(flatList)) {
                        flatList.forEach(item => {
                            let timeStr = item.ETA || item.eta || item.time || item.departure_time;
                            if (timeStr) etasRaw.push(timeStr);
                        });
                    }
                    
                    etas = etasRaw.map(timeStr => {
                        let targetTime;
                        // Time Padding for HH:mm or HH:mm:ss formats
                        if (/^\d{2}:\d{2}(:\d{2})?$/.test(timeStr)) {
                            const today = new Date(now);
                            const timeParts = timeStr.split(':');
                            today.setHours(parseInt(timeParts[0], 10), parseInt(timeParts[1], 10), timeParts[2] ? parseInt(timeParts[2], 10) : 0, 0);
                            
                            // Cross-day schedule automatic padding logic
                            if (today.getTime() < now) {
                                today.setDate(today.getDate() + 1);
                            }
                            targetTime = today.getTime();
                        } else {
                            // Safari defensive parsing avoiding .replace(/-/g, '/') on ISO 8601 strings
                            let safeTimeStr = timeStr;
                            if (!timeStr.includes('T')) {
                                safeTimeStr = timeStr.replace(/-/g, '/');
                            }
                            targetTime = new Date(safeTimeStr).getTime();
                        }
                        return Math.floor((targetTime - now) / 60000);
                    }).filter(e => !isNaN(e) && e >= 0);

                } else if (transitType === 'NLB') {
                    if (json.estimatedArrivals && Array.isArray(json.estimatedArrivals)) {
                        etas = json.estimatedArrivals.filter(t => t.estimatedArrivalTime).map(t => { return Math.max(0, Math.floor((new Date(t.estimatedArrivalTime.replace(/-/g, '/')).getTime() - now) / 60000)); });
                    }
                } else if (transitType === 'GMB') {
                    if (json.data && json.data.length > 0 && json.data[0].eta && Array.isArray(json.data[0].eta)) {
                        etas = json.data[0].eta.filter(e => e.diff !== undefined).map(e => e.diff);
                    }
                } else if (transitType === 'LRT') {
                    let targetRouteNo = routeObj.route || '';
                    if (!targetRouteNo && routeObj.route_key && routeObj.route_key.startsWith('route_lrt_')) {
                        targetRouteNo = routeObj.route_key.replace('route_lrt_', '').toUpperCase();
                    }
                    if (targetRouteNo.startsWith('LRT-')) targetRouteNo = targetRouteNo.replace('LRT-', '');
                    
                    let rawEtas = [];
                    if (json.platform_list && Array.isArray(json.platform_list)) {
                        json.platform_list.forEach(plat => {
                            if (plat.route_list && Array.isArray(plat.route_list)) {
                                plat.route_list.forEach(r => {
                                    if (r.route_no === targetRouteNo && r.time_en) {
                                        const timeStr = r.time_en.toLowerCase();
                                        if (timeStr.includes('arriving') || timeStr.includes('departing') || timeStr === '-') {
                                            rawEtas.push(0); 
                                        } else {
                                            const min = parseInt(timeStr);
                                            if (!isNaN(min) && min >= 0) rawEtas.push(min);
                                        }
                                    }
                                });
                            }
                        });
                    }
                    etas = [...new Set(rawEtas)].sort((a, b) => a - b);
                }
            } catch (err) {}
            return etas;
        }
        setInterval(fetchAllETAs, 30000);
    </script>
</body>
</html>
