<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="appName">貼地通 - 設定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="lang.js?v=18"></script>
    <script src="config.js?v=18"></script>
    <script src="header.js"></script>
    <script src="footer.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { overscroll-behavior-y: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans pb-24">
    
    <div id="app-header"></div>
    
    <main class="flex-1 p-4 overflow-y-auto space-y-6">

        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="bg-blue-50 px-4 py-3 border-b border-blue-100 flex items-center gap-2">
                <i class="fas fa-shield-halved text-blue-500 text-lg"></i>
                <h2 class="font-bold text-gray-700" data-i18n="dataVaultTitle">數據保險箱</h2>
            </div>
            <div class="p-4 space-y-3">
                <p class="text-xs text-gray-500 mb-2" data-i18n="dataVaultDesc">安全備份你的儀表板路線及群組設定。換手機時可隨時還原。</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="exportBackup()" class="flex flex-col items-center justify-center p-3 bg-gray-50 hover:bg-blue-50 border border-gray-200 rounded-lg transition text-blue-600">
                        <i class="fas fa-file-export text-2xl mb-1"></i>
                        <span class="text-sm font-bold" data-i18n="exportBtn">匯出備份</span>
                    </button>
                    <button onclick="triggerImport()" class="flex flex-col items-center justify-center p-3 bg-gray-50 hover:bg-green-50 border border-gray-200 rounded-lg transition text-green-600">
                        <i class="fas fa-file-import text-2xl mb-1"></i>
                        <span class="text-sm font-bold" data-i18n="importBtn">匯入還原</span>
                    </button>
                </div>
                <input type="file" id="import-file" accept=".json" class="hidden" onchange="importBackup(event)">
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="bg-purple-50 px-4 py-3 border-b border-purple-100 flex items-center gap-2">
                <i class="fas fa-language text-purple-500 text-lg"></i>
                <h2 class="font-bold text-gray-700" data-i18n="displaySettingsTitle">顯示設定</h2>
            </div>
            <div class="p-4 space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2" data-i18n="langLabel">介面語言 (Language)</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="changeSettingLang('tc')" id="lang-btn-tc" class="py-2 border rounded-lg font-bold text-sm text-gray-500 transition" data-i18n="langTc">繁體</button>
                        <button onclick="changeSettingLang('sc')" id="lang-btn-sc" class="py-2 border rounded-lg font-bold text-sm text-gray-500 transition" data-i18n="langSc">简体</button>
                        <button onclick="changeSettingLang('en')" id="lang-btn-en" class="py-2 border rounded-lg font-bold text-sm text-gray-500 transition" data-i18n="langEn">ENG</button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2" data-i18n="refreshLabel">ETA 自動刷新頻率</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="changeRefreshRate(15)" id="refresh-15" class="py-2 border rounded-lg font-bold text-sm text-gray-500 transition" data-i18n="refresh15">15秒 (極速)</button>
                        <button onclick="changeRefreshRate(30)" id="refresh-30" class="py-2 border rounded-lg font-bold text-sm text-gray-500 transition" data-i18n="refresh30">30秒 (預設)</button>
                        <button onclick="changeRefreshRate(60)" id="refresh-60" class="py-2 border rounded-lg font-bold text-sm text-gray-500 transition" data-i18n="refresh60">60秒 (省電)</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm border border-red-100 overflow-hidden">
            <div class="bg-red-50 px-4 py-3 border-b border-red-100 flex items-center gap-2">
                <i class="fas fa-triangle-exclamation text-red-500 text-lg"></i>
                <h2 class="font-bold text-red-700" data-i18n="dangerZoneTitle">危險區域</h2>
            </div>
            <div class="p-4">
                <button onclick="factoryReset()" class="w-full flex items-center justify-center gap-2 py-3 bg-white border-2 border-red-200 text-red-600 hover:bg-red-50 rounded-lg font-bold transition">
                    <i class="fas fa-trash-can"></i> <span data-i18n="factoryResetBtn">恢復原廠設定 (清空所有路線)</span>
                </button>
            </div>
        </section>

    </main>

    <div id="app-footer"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof renderHeader === "function") renderHeader();
            if (typeof renderFooter === "function") renderFooter();
            initSettingsUI();
            if (typeof translatePage === "function") translatePage();
            
            // 監聽 Header 點擊，確保頂部按鈕同設定頁按鈕同步
            const header = document.getElementById('app-header');
            if (header) {
                header.addEventListener('click', () => {
                    setTimeout(initSettingsUI, 50);
                });
            }
        });

        // ==========================================
        // 模塊 1：數據備份與還原
        // ==========================================
        function exportBackup() {
            const routes = localStorage.getItem('hk_transit_routes');
            if (!routes || routes === '[]') {
                alert(getTranslation('exportNoRoutes', '儀表板目前沒有任何路線，無須備份！'));
                return;
            }
            
            const dateStr = new Date().toISOString().slice(0,10).replace(/-/g, '');
            const blob = new Blob([routes], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `HK_Transit_Backup_${dateStr}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function triggerImport() { document.getElementById('import-file').click(); }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        localStorage.setItem('hk_transit_routes', JSON.stringify(data));
                        alert(getTranslation('importSuccessAlert', '🎉 成功還原備份資料！請前往儀表板查看。'));
                        event.target.value = ''; 
                    } else {
                        throw new Error("Invalid Format");
                    }
                } catch (error) {
                    alert(getTranslation('importErrorFormat', '❌ 檔案格式錯誤，請確保選擇正確的 JSON 備份檔。'));
                    event.target.value = '';
                }
            };
            reader.readAsText(file);
        }

        // ==========================================
        // 模塊 2：顯示與語系設定
        // ==========================================
        function getTranslation(key, defaultText) { 
            return (window.langDict && window.langDict[currentLang] && window.langDict[currentLang][key]) ? window.langDict[currentLang][key] : (defaultText || key); 
        }

        function initSettingsUI() {
            const activeLang = localStorage.getItem('transit_app_lang') || 'tc';
            updateButtonGroup('lang-btn-', activeLang, 'border-purple-500 bg-purple-50 text-purple-700', 'border-gray-200 text-gray-500');
            
            const activeRate = localStorage.getItem('hk_transit_refresh_rate') || '30';
            updateButtonGroup('refresh-', activeRate, 'border-purple-500 bg-purple-50 text-purple-700', 'border-gray-200 text-gray-500');
        }

        function updateButtonGroup(prefix, activeValue, activeClasses, inactiveClasses) {
            const buttons = document.querySelectorAll(`[id^="${prefix}"]`);
            buttons.forEach(btn => {
                btn.className = `py-2 border rounded-lg font-bold text-sm transition ${inactiveClasses}`;
                if (btn.id === `${prefix}${activeValue}`) {
                    btn.className = `py-2 border rounded-lg font-bold text-sm transition ${activeClasses}`;
                }
            });
        }

        function changeSettingLang(lang) {
            if (typeof setLang === 'function') {
                setLang(lang); // 觸發 lang.js 的核心切換
            } else {
                localStorage.setItem('transit_app_lang', lang);
                currentLang = lang;
                if (typeof translatePage === "function") translatePage();
            }
            initSettingsUI(); // 更新設定頁中間按鈕嘅顏色
        }

        function changeRefreshRate(seconds) {
            localStorage.setItem('hk_transit_refresh_rate', seconds);
            initSettingsUI();
            alert(getTranslation('refreshSetMsg1', '已將 ETA 刷新頻率設為 ') + seconds + getTranslation('refreshSetMsg2', ' 秒。'));
        }

        // ==========================================
        // 模塊 3：危險區域 (原廠設定)
        // ==========================================
        function factoryReset() {
            const confirmMsg = getTranslation('factoryResetWarn', "🚨 警告：這將會清除你所有的路線、自訂花名及群組設定。\n\n這個動作無法復原！確定要繼續嗎？");
            if (confirm(confirmMsg)) {
                localStorage.removeItem('hk_transit_routes');
                localStorage.removeItem('hk_transit_group_order');
                localStorage.removeItem('custom_n8n_url');
                localStorage.removeItem('custom_n8n_token');
                localStorage.removeItem('hk_transit_refresh_rate');
                
                alert(getTranslation('factoryResetDone', '🗑️ 系統已成功恢復原廠設定。'));
                window.location.href = 'index.html'; 
            }
        }
    </script>
</body>
</html>
