<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="setupTitle"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="lang.js?v=62"></script>
    <script src="config.js?v=62"></script> 
    <script src="header.js"></script>
    <script src="footer.js"></script>
    <script src="data-static.js?v=62"></script>
    <style>
        .hidden-step { display: none !important; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .color-dot.selected { border-color: #374151; transform: scale(1.1); box-shadow: 0 0 0 2px white inset; }
        .transit-pill { transition: all 0.2s; border: 1.5px solid #e5e7eb; }
        .transit-pill.selected-red { background-color: #fef2f2 !important; border-color: #ef4444 !important; color: #b91c1c !important; font-weight: bold; }
        .transit-pill.selected-green { background-color: #f0fdf4 !important; border-color: #22c55e !important; color: #15803d !important; font-weight: bold; }
        .transit-pill.selected-yellow { background-color: #fefce8 !important; border-color: #eab308 !important; color: #a16207 !important; font-weight: bold; }
        .transit-pill.selected-orange { background-color: #fff7ed !important; border-color: #f97316 !important; color: #c2410c !important; font-weight: bold; }
        
        /* 🌟 美化橫向滑動條 */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px; 
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        .custom-scrollbar {
            scrollbar-width: thin; 
            scrollbar-color: #cbd5e1 #f1f5f9; 
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen pb-24">
    <div id="app-header"></div>
    <main class="max-w-lg mx-auto mt-6 px-4">
        
      <div class="bg-white rounded-xl shadow-sm p-5 mb-4 border border-gray-100">
            <h2 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider" data-i18n="step1Group"></h2>
            <div class="flex flex-col gap-3">
                <div class="flex gap-2">
                    <select id="group-select" onchange="checkStep1()" class="w-full flex-1 border-2 border-gray-200 rounded-lg px-4 py-3 text-base font-medium focus:outline-none focus:border-red-500 bg-white">
                        <option value="" disabled selected data-i18n="selectGroup"></option>
                    </select>
                    <button id="edit-group-btn" onclick="editGroupName()" class="hidden-step bg-gray-50 text-gray-400 hover:text-blue-500 hover:border-blue-300 px-4 py-2 rounded-lg border-2 border-gray-200 transition" title="修改群組名稱">
                        <i class="fas fa-pencil-alt"></i>
                    </button>
                </div>
                
                <div id="new-group-container" class="hidden-step flex gap-2">
                    <input type="text" id="new-group-input" class="w-full flex-1 border-2 border-gray-200 rounded-lg px-4 py-3 text-base focus:outline-none focus:border-red-500" data-i18n-placeholder="newGroupPlaceholder" placeholder="輸入新群組名稱...">
                    <button onclick="confirmNewGroup()" class="bg-gray-800 text-white font-bold px-5 py-3 rounded-lg hover:bg-gray-900 transition whitespace-nowrap shadow-sm" data-i18n="confirmBtn">
                        確定
                    </button>
                </div>
            </div>
        </div>

       <div id="step2-area" class="bg-white rounded-xl shadow-sm p-5 mb-4 border border-gray-100 hidden-step transition-all">
            <h2 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider" data-i18n="step2Select"></h2>
            <div class="grid grid-cols-2 gap-3 mb-5" id="transit-selector">
                <button onclick="selectTransit('BUS')" id="pill-BUS" class="transit-pill selected-red py-3 rounded-xl flex flex-col items-center justify-center text-sm text-gray-500 bg-gray-50">
                    <div class="h-10 flex items-center justify-center mb-1.5 w-full">
                        <img src="BUS.png" alt="Bus" class="h-8 object-contain" style="mix-blend-mode: multiply; transform: scale(1.3);">
                    </div>
                    <span data-i18n="transitBUS"></span>
                </button>
                <button onclick="selectTransit('GMB')" id="pill-GMB" class="transit-pill py-3 rounded-xl flex flex-col items-center justify-center text-sm text-gray-500 bg-gray-50">
                    <div class="h-10 flex items-center justify-center mb-1.5 w-full">
                        <img src="MINIBUS.png" alt="Minibus" class="h-8 object-contain" style="mix-blend-mode: multiply; transform: scale(1.3);">
                    </div>
                    <span data-i18n="transitGMB_new"></span>
                </button>
                <button onclick="selectTransit('MTR')" id="pill-MTR" class="transit-pill py-3 rounded-xl flex flex-col items-center justify-center text-sm text-gray-500 bg-gray-50 overflow-hidden">
                    <div class="h-10 flex items-center justify-center mb-1.5 w-full">
                        <img src="MTR.png" alt="MTR" class="h-10 object-contain" style="transform: scale(1.6); mix-blend-mode: multiply;">
                    </div>
                    <span data-i18n="transitMTR" class="relative z-10"></span>
                </button>
                <button onclick="selectTransit('LRT')" id="pill-LRT" class="transit-pill py-3 rounded-xl flex flex-col items-center justify-center text-sm text-gray-500 bg-gray-50">
                    <div class="h-10 flex items-center justify-center mb-1.5 w-full">
                        <i class="fas fa-train-tram text-orange-500 text-[32px]"></i>
                    </div>
                    <span data-i18n="transitLRT"></span>
                </button>
            </div>

            <div id="omni-input-area" class="mb-4">
                <input type="text" id="route-input" class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 text-2xl focus:outline-none focus:border-red-500 font-bold uppercase text-center tracking-widest" data-i18n-placeholder="searchPlaceholder" placeholder="">
                <button onclick="fetchOmniStops()" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg mt-3 hover:bg-red-700 transition text-sm flex justify-center items-center gap-2 shadow-sm">
                    <span data-i18n="searchBtn"></span>
                </button>
                <p id="loading-text" class="text-red-500 text-sm mt-2 font-medium text-center hidden-step" data-i18n="loading"></p>
            </div>

            <div id="static-route-area" class="mb-4 hidden-step">
                <select id="static-route-select" onchange="loadStaticRoute()" class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 text-base font-bold focus:outline-none focus:border-red-500 bg-white">
                    <option value="" disabled selected data-i18n="static_select_placeholder"></option>
                </select>
            </div>

            <div id="stop-selection-ui" class="hidden-step border-t border-gray-100 pt-3">
                <div class="flex overflow-x-auto gap-2 mb-3 pb-3 snap-x custom-scrollbar w-full cursor-grab select-none" id="direction-tabs"></div>
                <select id="stop-select" onchange="checkStep2()" class="w-full border-2 border-gray-200 rounded-lg px-3 py-3 text-base font-medium focus:outline-none focus:border-red-500 bg-white cursor-pointer">
                    <option value="" disabled selected data-i18n="selectStop"></option>
                </select>
            </div>
        </div>

        <div id="setup-area" class="bg-white rounded-xl shadow-sm p-5 border border-red-100 hidden-step transition-all">
            <h2 class="text-sm font-bold text-red-500 mb-4 uppercase tracking-wider flex items-center gap-2">
                <span>✨</span> <span data-i18n="step4Save"></span>
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="aliasLabel"></label>
                    <input type="text" id="alias-input" class="w-full border rounded-lg px-3 py-2 focus:border-red-500 focus:outline-none bg-gray-50 font-bold text-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="colorLabel"></label>
                    <div class="flex gap-3 mt-2" id="color-picker">
                        <div class="color-dot bg-red-500 selected" data-color="red" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-blue-500" data-color="blue" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-green-500" data-color="green" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-orange-500" data-color="orange" onclick="selectColor(this)"></div>
                        <div class="color-dot bg-purple-500" data-color="purple" onclick="selectColor(this)"></div>
                    </div>
                </div>
                <button onclick="saveToDashboard()" class="w-full bg-gray-900 text-white font-bold py-3 rounded-lg mt-4 shadow-md hover:bg-gray-800 transition flex justify-center items-center gap-2">
                    ✅ <span data-i18n="saveBtn"></span>
                </button>
            </div>
        </div>
    </main>
    <div id="app-footer"></div>
    
    <script>
        window.selectedGroup = ""; window.selectedTransit = "BUS"; window.currentTransit = "";
        window.currentRouteData = null; window.activeDirection = ''; window.selectedColor = 'red';
        window.MTR_CSV_DICT = {}; 
        
        if (typeof window.CTB_DICT_CACHE === 'undefined') { window.CTB_DICT_CACHE = {}; }

        window.onload = () => {
            if (typeof renderHeader === "function") renderHeader();
            if (typeof renderFooter === "function") renderFooter();
            loadExistingGroups();
            loadMtrCsvData(); 
            initDragToScroll(); // 🌟 啟動電腦 Mouse 拖曳修復補丁
        };

        // 🌟 滑動修復補丁：令電腦版可以用 Mouse 撳住拖曳 (Drag to Scroll)
        function initDragToScroll() {
            const slider = document.getElementById('direction-tabs');
            if (!slider) return;
            let isDown = false;
            let startX;
            let scrollLeft;
            let isDragged = false; // 用來判斷係咪拖緊，防止拖緊嗰陣誤撳按鈕

            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                isDragged = false;
                slider.style.cursor = 'grabbing';
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => {
                isDown = false;
                slider.style.cursor = 'grab';
            });
            slider.addEventListener('mouseup', () => {
                isDown = false;
                slider.style.cursor = 'grab';
            });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 1.5; // 滑動速度
                if (Math.abs(walk) > 5) isDragged = true; // 超過 5px 就當係拖曳，唔係點擊
                slider.scrollLeft = scrollLeft - walk;
            });

            // 攔截點擊事件：如果頭先係拖曳緊，就取消點擊效果
            slider.addEventListener('click', (e) => {
                if (isDragged) {
                    e.preventDefault();
                    e.stopPropagation();
                }
            }, true);
        }

        async function loadMtrCsvData() {
            try {
                const githubCsvUrl = 'https://raw.githubusercontent.com/msbecky5354/hk-transit-hub/main/data/mtr_lines_and_stations.csv';
                const res = await fetch(githubCsvUrl);
                
                if (!res.ok) {
                    console.error("GitHub CSV 讀取失敗", res.status);
                    return;
                }
                const text = await res.text();
                const lines = text.split('\n');
                if (lines.length < 2) return;

                const headers = lines[0].split(',').map(h => h.trim());
                const codeIdx = headers.indexOf('Station Code');
                const tcIdx = headers.indexOf('Chinese Name');
                const enIdx = headers.indexOf('English Name');

                if (codeIdx === -1 || tcIdx === -1 || enIdx === -1) return;

                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const cols = lines[i].split(',');
                    const code = cols[codeIdx]?.trim();
                    const tc = cols[tcIdx]?.trim();
                    const en = cols[enIdx]?.trim();
                    if (code && tc) {
                        window.MTR_CSV_DICT[code] = { tc: tc, sc: tc, en: (en || tc) }; 
                    }
                }
            } catch (e) {
                console.warn("未能讀取 CSV，將使用 API 預設名稱。", e);
            }
        }

        function loadExistingGroups() {
            const selectEl = document.getElementById('group-select');
            let routes = JSON.parse(localStorage.getItem('hk_transit_routes') || '[]');
            let existingGroups = [...new Set(routes.map(r => r.group))];
            const defaultGroups = ["groupHome", "groupWork"];
            let allGroups = [...new Set([...defaultGroups, ...existingGroups.filter(g => g !== "🏠 屋企落樓" && g !== "🏠 屋企落楼" && g !== "🏠 Home" && g !== "💼 返工轉車" && g !== "💼 返工转车" && g !== "💼 Commute")])];
            
            const placeholder = typeof getTranslation === 'function' ? getTranslation('selectGroup') : '請選擇或建立群組...';
            selectEl.innerHTML = `<option value="" disabled selected data-i18n="selectGroup">${placeholder}</option>`;
            allGroups.forEach(group => { selectEl.innerHTML += `<option value="${group}">${typeof getTranslation === 'function' ? getTranslation(group, group) : group}</option>`; });
            selectEl.innerHTML += `<option value="NEW_GROUP" data-i18n="createNewGroup">${typeof getTranslation === 'function' ? getTranslation('createNewGroup') : '➕ 建立新群組...'}</option>`;
        }

       function checkStep1() {
            const groupSelect = document.getElementById('group-select').value;
            const newGroupContainer = document.getElementById('new-group-container');
            const editBtn = document.getElementById('edit-group-btn');
            const step2Area = document.getElementById('step2-area');
            
            step2Area.classList.add('hidden-step'); 

            if (groupSelect === "NEW_GROUP") { 
                newGroupContainer.classList.remove('hidden-step'); 
                editBtn.classList.add('hidden-step');
                window.selectedGroup = ""; 
            } else if (groupSelect) { 
                newGroupContainer.classList.add('hidden-step'); 
                window.selectedGroup = groupSelect;
                step2Area.classList.remove('hidden-step'); 
                
                if(groupSelect === "groupHome" || groupSelect === "groupWork") {
                    editBtn.classList.add('hidden-step');
                } else {
                    editBtn.classList.remove('hidden-step');
                }
            }
        }

        function confirmNewGroup() {
            const inputVal = document.getElementById('new-group-input').value.trim();
            if (!inputVal) {
                alert(typeof getTranslation === 'function' ? getTranslation('enterGroupName', '請輸入群組名稱！') : '請輸入群組名稱！');
                return;
            }
            window.selectedGroup = inputVal;
            document.getElementById('step2-area').classList.remove('hidden-step');
            
            const inputEl = document.getElementById('new-group-input');
            inputEl.classList.add('border-green-500', 'bg-green-50');
            setTimeout(() => {
                inputEl.classList.remove('border-green-500', 'bg-green-50');
            }, 800);
        }

        function editGroupName() {
            const oldName = window.selectedGroup;
            if(!oldName || oldName === "NEW_GROUP") return;

            const promptMsg = typeof getTranslation === 'function' ? getTranslation('editGroupPrompt', '請輸入新的群組名稱：') : '請輸入新的群組名稱：';
            const newName = prompt(promptMsg, oldName);
            
            if (newName !== null && newName.trim() !== "" && newName.trim() !== oldName) {
                const trimmedNewName = newName.trim();
                
                let routes = JSON.parse(localStorage.getItem('hk_transit_routes') || '[]');
                routes = routes.map(r => {
                    if(r.group === oldName) {
                        r.group = trimmedNewName;
                    }
                    return r;
                });
                localStorage.setItem('hk_transit_routes', JSON.stringify(routes));
                
                window.selectedGroup = trimmedNewName;
                loadExistingGroups();
                
                document.getElementById('group-select').value = trimmedNewName;
                checkStep1(); 
            }
        }

        function selectTransit(type) {
            window.selectedTransit = type;
            const pills = ['BUS', 'GMB', 'MTR', 'LRT'];
            const allSelectedClasses = ['selected-red', 'selected-green', 'selected-yellow', 'selected-orange'];
            
            pills.forEach(p => {
                const element = document.getElementById(`pill-${p}`);
                if (!element) return;
                element.classList.remove(...allSelectedClasses, 'text-gray-500', 'bg-gray-50');
                if (p === type) { 
                    const colorClass = { 'BUS': 'selected-red', 'GMB': 'selected-green', 'MTR': 'selected-yellow', 'LRT': 'selected-orange' }[type];
                    element.classList.add(colorClass);
                } else { element.classList.add('text-gray-500', 'bg-gray-50'); }
            });

            const inputArea = document.getElementById('omni-input-area');
            const staticArea = document.getElementById('static-route-area');
            const staticSelect = document.getElementById('static-route-select');
            document.getElementById('stop-selection-ui').classList.add('hidden-step');
            document.getElementById('setup-area').classList.add('hidden-step');

            if (['MTR', 'LRT'].includes(type)) {
                inputArea.classList.add('hidden-step'); staticArea.classList.remove('hidden-step');
                
                const placeholderKey = type === 'MTR' ? 'placeholderMTR' : 'placeholderLRT';
                const fallbackText = type === 'MTR' ? '請選擇港鐵路線...' : '請選擇輕鐵路線...';
                const placeholderText = typeof getTranslation === 'function' ? getTranslation(placeholderKey, fallbackText) : fallbackText;
                
                staticSelect.innerHTML = `<option value="" disabled selected data-i18n="${placeholderKey}">${placeholderText}</option>`;
                
                const mtrEmojiMap = {
                    'TKL': '🟣 ', 'ISL': '🔵 ', 'TWL': '🔴 ', 'KTL': '🟢 ', 
                    'TCL': '🟠 ', 'SIL': '🟡 ', 'TML': '🤎 ', 'EAL': '🩵 ', 
                    'DRL': '🐭 ', 'AEL': '✈️ ' 
                };

                Object.keys(window.STATIC_DICTIONARY).forEach(key => {
                    if (window.STATIC_DICTIONARY[key].transitType === type) {
                        let displayName = (type === 'LRT') ? window.STATIC_DICTIONARY[key].route : (typeof getTranslation === 'function' ? getTranslation(window.STATIC_DICTIONARY[key].route_key, key) : key);
                        
                        if (type === 'MTR' && mtrEmojiMap[key]) {
                            displayName = mtrEmojiMap[key] + displayName;
                        }
                        
                        staticSelect.innerHTML += `<option value="${key}">${displayName}</option>`;
                    }
                });
            } else {
                inputArea.classList.remove('hidden-step'); staticArea.classList.add('hidden-step');
            }
        }

       window.fetchOmniStops = async function() {
            const routeInput = document.getElementById('route-input').value.trim().toUpperCase();
            if (!routeInput) return;

            const loading = document.getElementById('loading-text');
            loading.classList.remove('hidden-step');
            const hexColorMap = { 'BUS': '#ef4444', 'GMB': '#22c55e', 'MTR': '#eab308', 'LRT': '#f97316' };
            loading.style.color = hexColorMap[window.selectedTransit] || '#ef4444';
            loading.textContent = typeof getTranslation === 'function' ? getTranslation('loading') : '載入中...';
            
            document.getElementById('stop-selection-ui').classList.add('hidden-step');
            document.getElementById('setup-area').classList.add('hidden-step');

            try {
                let directions = {};
                let transitType = window.selectedTransit;

                if (window.selectedTransit === 'BUS') {
                    const [kmbRes, ctbRes, nlbRes, mtrBusRes] = await Promise.allSettled([
                        fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route/${routeInput}/outbound/1`).catch(()=>null),
                        fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/route/CTB/${routeInput}`).catch(()=>null),
                        fetch(`https://rt.data.gov.hk/v2/transport/nlb/route.php?action=list`).catch(()=>null),
                        fetch(`https://rt.data.gov.hk/v1/transport/mtr/bus/getSchedule`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({language:"zh", routeName:routeInput}) }).catch(()=>null)
                    ]);

                    const kmbInfo = kmbRes.status === 'fulfilled' && kmbRes.value && kmbRes.value.ok ? await kmbRes.value.json() : null;
                    const ctbInfo = ctbRes.status === 'fulfilled' && ctbRes.value && ctbRes.value.ok ? await ctbRes.value.json() : null;
                    const nlbInfo = nlbRes.status === 'fulfilled' && nlbRes.value && nlbRes.value.ok ? await nlbRes.value.json() : null;
                    const mtrBusInfo = mtrBusRes.status === 'fulfilled' && mtrBusRes.value && mtrBusRes.value.ok ? await mtrBusRes.value.json() : null;

                    if (mtrBusInfo && mtrBusInfo.busStop && mtrBusInfo.busStop.length > 0) {
                        let stopsOut = [], stopsIn = [];
                        mtrBusInfo.busStop.forEach(stop => {
                            let stopObj = {
                                stop_id: stop.busStopId,
                                name_obj: { tc: stop.busStopId, en: stop.busStopId },
                                api_url: `https://rt.data.gov.hk/v1/transport/mtr/bus/getSchedule?routeName=${routeInput}`
                            };
                            if (stop.busStopId.includes('-U')) stopsIn.push(stopObj);
                            else stopsOut.push(stopObj);
                        });
                        if (stopsOut.length > 0) directions['mtrbus_outbound'] = { dest_name: { tc: `${routeInput} 去程`, en: `${routeInput} Outbound` }, stops: stopsOut };
                        if (stopsIn.length > 0) directions['mtrbus_inbound'] = { dest_name: { tc: `${routeInput} 回程`, en: `${routeInput} Inbound` }, stops: stopsIn };
                    }

                    if (kmbInfo && kmbInfo.data) {
                        const [outRes, inRes] = await Promise.allSettled([
                            fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${routeInput}/outbound/1`),
                            fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${routeInput}/inbound/1`)
                        ]);
                        const kOut = outRes.status === 'fulfilled' && outRes.value.ok ? await outRes.value.json() : null;
                        const kIn = inRes.status === 'fulfilled' && inRes.value.ok ? await inRes.value.json() : null;
                        
                        const rInfo = Array.isArray(kmbInfo.data) ? kmbInfo.data[0] : kmbInfo.data;
                        const isLwb = rInfo.co === 'LWB';
                        const coTc = isLwb ? '龍運' : '九巴', coEn = isLwb ? 'LWB' : 'KMB';

                        if (kOut && kOut.data && kOut.data.length > 0) {
                            directions['kmb_outbound'] = { dest_name: { tc: `${rInfo.dest_tc || '未知'} (${coTc})`, en: `${rInfo.dest_en || 'Unknown'} (${coEn})` }, stops: kOut.data.map(s => ({ stop_id: s.stop, name_obj: { tc: `政府數據載入中...`, en: `Loading...` }, api_url: `https://data.etabus.gov.hk/v1/transport/kmb/eta/${s.stop}/${routeInput}/1` })) };
                        }
                        if (kIn && kIn.data && kIn.data.length > 0) {
                            directions['kmb_inbound'] = { dest_name: { tc: `${rInfo.orig_tc || '未知'} (${coTc})`, en: `${rInfo.orig_en || 'Unknown'} (${coEn})` }, stops: kIn.data.map(s => ({ stop_id: s.stop, name_obj: { tc: `政府數據載入中...`, en: `Loading...` }, api_url: `https://data.etabus.gov.hk/v1/transport/kmb/eta/${s.stop}/${routeInput}/1` })) };
                        }
                    }

                    if (ctbInfo && ctbInfo.data && ctbInfo.data.route === routeInput) {
                        const [outRes, inRes] = await Promise.allSettled([
                            fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/route-stop/CTB/${routeInput}/outbound`),
                            fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/route-stop/CTB/${routeInput}/inbound`)
                        ]);
                        const cOut = outRes.status === 'fulfilled' && outRes.value.ok ? await outRes.value.json() : null;
                        const cIn = inRes.status === 'fulfilled' && inRes.value.ok ? await inRes.value.json() : null;
                        const cInfo = ctbInfo.data;

                        const formatCtbStops = (arr) => arr ? arr.map(s => ({ stop_id: s.stop, name_obj: { tc: "🔄 政府數據載入中...", en: "Loading..." }, api_url: `https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/CTB/${s.stop}/${routeInput}` })) : [];
                        const outStops = cOut && cOut.data ? formatCtbStops(cOut.data) : [];
                        const inStops = cIn && cIn.data ? formatCtbStops(cIn.data) : [];

                        const splitCircularRoute = (stopsArray) => {
                            let splitIndex = Math.floor(stopsArray.length / 2);
                            let destTc = (cInfo.dest_tc || '').replace(/\(循環線\)/g, '').trim();
                            let destEn = (cInfo.dest_en || '').replace(/\(Circular\)/gi, '').trim();
                            return {
                                outbound: { dest_name: { tc: `${destTc} (城巴)`, en: `${destEn} (CTB)` }, stops: stopsArray.slice(0, splitIndex + 1) },
                                inbound: { dest_name: { tc: `${cInfo.orig_tc || ''} (城巴)`, en: `${cInfo.orig_en || ''} (CTB)` }, stops: stopsArray.slice(splitIndex) }
                            };
                        };

                        if (outStops.length > 0 && inStops.length === 0) {
                            const res = splitCircularRoute(outStops); directions['ctb_outbound'] = res.outbound; directions['ctb_inbound'] = res.inbound;
                        } else if (inStops.length > 0 && outStops.length === 0) {
                            const res = splitCircularRoute(inStops); directions['ctb_outbound'] = res.outbound; directions['ctb_inbound'] = res.inbound;
                        } else if (outStops.length > 0 && inStops.length > 0) {
                            if (outStops.length === inStops.length && outStops[0].stop_id === inStops[0].stop_id) {
                                const res = splitCircularRoute(outStops); directions['ctb_outbound'] = res.outbound; directions['ctb_inbound'] = res.inbound;
                            } else {
                                directions['ctb_outbound'] = { dest_name: { tc: `${cInfo.dest_tc || '未知'} (城巴)`, en: `${cInfo.dest_en || 'Unknown'} (CTB)` }, stops: outStops };
                                directions['ctb_inbound'] = { dest_name: { tc: `${cInfo.orig_tc || '未知'} (城巴)`, en: `${cInfo.orig_en || 'Unknown'} (CTB)` }, stops: inStops };
                            }
                        }
                    }

                    if (nlbInfo && nlbInfo.routes) {
                        const matchedRoutes = nlbInfo.routes.filter(r => r.routeNo.toUpperCase() === routeInput);
                        const getDest = (name) => name && name.includes('>') ? name.split('>')[1].trim() : name;
                        
                        if (matchedRoutes.length > 0) {
                            const r1 = matchedRoutes[0];
                            const r1Res = await fetch(`https://rt.data.gov.hk/v2/transport/nlb/stop.php?action=list&routeId=${r1.routeId}`);
                            if (r1Res.ok) {
                                const r1Data = await r1Res.json();
                                if (r1Data.stops) {
                                    directions['nlb_outbound'] = { dest_name: { tc: `${getDest(r1.routeName_c)} (嶼巴)`, en: `${getDest(r1.routeName_e)} (NLB)` }, stops: r1Data.stops.map(s => ({ stop_id: s.stopId.toString(), name_obj: { tc: s.stopName_c || `站點 ${s.stopId}`, en: s.stopName_e || `Stop ${s.stopId}` }, api_url: `https://rt.data.gov.hk/v2/transport/nlb/stop.php?action=estimatedArrivals&routeId=${r1.routeId}&stopId=${s.stopId}&language=zh` })) };
                                }
                            }
                            if (matchedRoutes.length > 1) {
                                const r2 = matchedRoutes[1];
                                const r2Res = await fetch(`https://rt.data.gov.hk/v2/transport/nlb/stop.php?action=list&routeId=${r2.routeId}`);
                                if (r2Res.ok) {
                                    const r2Data = await r2Res.json();
                                    if (r2Data.stops) {
                                        directions['nlb_inbound'] = { dest_name: { tc: `${getDest(r2.routeName_c)} (嶼巴)`, en: `${getDest(r2.routeName_e)} (NLB)` }, stops: r2Data.stops.map(s => ({ stop_id: s.stopId.toString(), name_obj: { tc: s.stopName_c || `站點 ${s.stopId}`, en: s.stopName_e || `Stop ${s.stopId}` }, api_url: `https://rt.data.gov.hk/v2/transport/nlb/stop.php?action=estimatedArrivals&routeId=${r2.routeId}&stopId=${s.stopId}&language=zh` })) };
                                    }
                                }
                            }
                        }
                    }
                }

                if (window.selectedTransit === 'GMB') {
                    const regions = ['NT', 'KLN', 'HKI'];
                    for (const region of regions) {
                        try {
                            const rRes = await fetch(`https://data.etagmb.gov.hk/route/${region}/${routeInput}`);
                            if (!rRes.ok) continue;
                            const info = await rRes.json();
                            
                            if (info.data && info.data.length > 0) {
                                for (let i = 0; i < info.data.length; i++) {
                                    const routeInfo = info.data[i];
                                    const routeId = routeInfo.route_id;
                                    
                                    const [outRes, inRes] = await Promise.allSettled([
                                        fetch(`https://data.etagmb.gov.hk/route-stop/${routeId}/1`),
                                        fetch(`https://data.etagmb.gov.hk/route-stop/${routeId}/2`)
                                    ]);
                                    
                                    const outData = outRes.status === 'fulfilled' && outRes.value.ok ? await outRes.value.json() : null;
                                    const inData = inRes.status === 'fulfilled' && inRes.value.ok ? await inRes.value.json() : null;

                                    let cOut = outData && outData.data && outData.data.route_stops ? outData.data.route_stops.map(s => ({ stop_id: s.stop_id.toString(), name_obj: { tc: s.name_tc, en: s.name_en }, api_url: `https://data.etagmb.gov.hk/eta/route-stop/${routeId}/${s.stop_id}` })) : [];
                                    let cIn = inData && inData.data && inData.data.route_stops ? inData.data.route_stops.map(s => ({ stop_id: s.stop_id.toString(), name_obj: { tc: s.name_tc, en: s.name_en }, api_url: `https://data.etagmb.gov.hk/eta/route-stop/${routeId}/${s.stop_id}` })) : [];

                                    if (cOut.length === 0 && cIn.length === 0) continue;

                                    let offDestTc = routeInfo.directions[0]?.dest_tc || "";
                                    let offDestEn = routeInfo.directions[0]?.dest_en || "";
                                    let offOrigTc = routeInfo.directions[0]?.orig_tc || "";
                                    let offOrigEn = routeInfo.directions[0]?.orig_en || "";

                                    const cleanDestName = (name) => name ? name.replace(/\s*\(.*?\)/g, '').replace(/站$/g, '').replace(/總站$/g, '').replace(/交匯處$/g, '').trim() : "";

                                    const splitGmbCircularRoute = (stopsArray) => {
                                        let splitIndex = Math.floor(stopsArray.length / 2);
                                        let realDestName = "";
                                        if (offDestTc) {
                                            realDestName = offDestTc.replace(/\s*\(.*?\)/g, '').trim();
                                            const keyword = cleanDestName(offDestTc);
                                            if (keyword.length >= 2) {
                                                for (let k = 1; k < stopsArray.length - 1; k++) {
                                                    if (stopsArray[k].name_obj.tc.includes(keyword)) splitIndex = k;
                                                }
                                            }
                                        }
                                        const turnaroundStop = stopsArray[splitIndex].name_obj;
                                        const finalStop = stopsArray[stopsArray.length - 1].name_obj;
                                        const outDest = realDestName ? { tc: realDestName, en: turnaroundStop.en } : { tc: turnaroundStop.tc, en: turnaroundStop.en };
                                        return {
                                            outbound: { dest_name: outDest, stops: stopsArray.slice(0, splitIndex + 1) },
                                            inbound: { dest_name: { tc: finalStop.tc, en: finalStop.en }, stops: stopsArray.slice(splitIndex) }
                                        };
                                    };

                                    const isOutCirc = cOut.length > 2 && cOut[0].name_obj.tc === cOut[cOut.length - 1].name_obj.tc;
                                    const isInCirc = cIn.length > 2 && cIn[0].name_obj.tc === cIn[cIn.length - 1].name_obj.tc;

                                    const outKey = `gmb_${region.toLowerCase()}_${i}_out`;
                                    const inKey = `gmb_${region.toLowerCase()}_${i}_in`;

                                    if (isOutCirc) {
                                        const res = splitGmbCircularRoute(cOut); directions[outKey] = res.outbound; directions[inKey] = res.inbound;
                                    } else if (isInCirc && cOut.length === 0) {
                                        const res = splitGmbCircularRoute(cIn); directions[outKey] = res.outbound; directions[inKey] = res.inbound;
                                    } else {
                                        if (cOut.length > 0) directions[outKey] = { dest_name: { tc: offDestTc || cOut[cOut.length - 1].name_obj.tc, en: offDestEn || cOut[cOut.length - 1].name_obj.en }, stops: cOut };
                                        if (cIn.length > 0) directions[inKey] = { dest_name: { tc: offOrigTc || cIn[cIn.length - 1].name_obj.tc, en: offOrigEn || cIn[cIn.length - 1].name_obj.en }, stops: cIn };
                                    }
                                }
                            }
                        } catch (regionErr) {
                            console.warn(`搜尋 ${region} 小巴時發生錯誤 (已略過):`, regionErr);
                        }
                    }
                }

                if (Object.keys(directions).length === 0) throw new Error(`找不到路線 ${routeInput}。`);

                if (typeof window.CTB_DICT_CACHE === 'undefined') window.CTB_DICT_CACHE = {};
                if (typeof window.KMB_DICT_CACHE === 'undefined') window.KMB_DICT_CACHE = {}; 

                let missingCtbStops = new Set();
                let missingKmbStops = new Set();

                Object.values(directions).forEach(dir => {
                    dir.stops.forEach(s => {
                        if (s.name_obj.tc.includes('政府數據載入中')) {
                            if (s.api_url.includes('citybus')) missingCtbStops.add(s.stop_id);
                            if (s.api_url.includes('kmb')) missingKmbStops.add(s.stop_id); 
                        }
                    });
                });

                if (missingCtbStops.size > 0) {
                    const stopsToFetch = Array.from(missingCtbStops).filter(id => !window.CTB_DICT_CACHE[id]);
                    await Promise.all(stopsToFetch.map(async id => {
                        try {
                            const res = await fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/stop/${id}`);
                            if (res.ok) { const d = await res.json(); if (d.data) window.CTB_DICT_CACHE[id] = d.data; }
                        } catch(e) {}
                    }));
                    Object.values(directions).forEach(dir => {
                        dir.stops.forEach(s => {
                            if (s.name_obj.tc.includes('政府數據載入中') && window.CTB_DICT_CACHE[s.stop_id]) {
                                s.name_obj = { tc: window.CTB_DICT_CACHE[s.stop_id].name_tc, en: window.CTB_DICT_CACHE[s.stop_id].name_en };
                            }
                        });
                    });
                }

                if (missingKmbStops.size > 0) {
                    const stopsToFetch = Array.from(missingKmbStops).filter(id => !window.KMB_DICT_CACHE[id]);
                    await Promise.all(stopsToFetch.map(async id => {
                        try {
                            const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${id}`);
                            if (res.ok) { const d = await res.json(); if (d.data) window.KMB_DICT_CACHE[id] = d.data; }
                        } catch(e) {}
                    }));
                    Object.values(directions).forEach(dir => {
                        dir.stops.forEach(s => {
                            if (s.name_obj.tc.includes('政府數據載入中') && window.KMB_DICT_CACHE[s.stop_id]) {
                                s.name_obj = { tc: window.KMB_DICT_CACHE[s.stop_id].name_tc, en: window.KMB_DICT_CACHE[s.stop_id].name_en };
                            }
                        });
                    });
                }

                if (window.MTR_BUS_DICT) {
                    Object.keys(directions).forEach(dirKey => {
                        if (dirKey.includes('mtrbus')) {
                            directions[dirKey].stops.forEach((s, i) => {
                                if (window.MTR_BUS_DICT.STOPS[s.stop_id]) s.name_obj = window.MTR_BUS_DICT.STOPS[s.stop_id];
                                else s.name_obj = { tc: `站點 ${i + 1} (${s.stop_id})`, en: `Stop ${i + 1} (${s.stop_id})` };
                            });
                        }
                    });
                }

                window.currentRouteData = { route: routeInput, transitType: transitType, directions: directions };
                window.currentTransit = transitType;
                window.activeDirection = Object.keys(directions)[0];

                document.getElementById('stop-selection-ui').classList.remove('hidden-step');
                renderDirectionTabs();
                renderStopDropdown();
                loading.classList.add('hidden-step');

            } catch (err) { 
                loading.textContent = err.message; 
            }
        };

        function loadStaticRoute() {
            const staticKey = document.getElementById('static-route-select').value;
            if (!staticKey) return;
            window.currentRouteData = window.STATIC_DICTIONARY[staticKey]; 
            
            window.currentTransit = window.currentRouteData.transitType; 
            window.activeDirection = Object.keys(window.currentRouteData.directions)[0];
            
            if (window.currentTransit === 'LRT') {
                const orangeDot = document.querySelector('.color-dot[data-color="orange"]');
                if (orangeDot) selectColor(orangeDot);
            } else if (window.currentTransit === 'MTR') {
                const yellowDot = document.querySelector('.color-dot[data-color="yellow"]');
                if (yellowDot) selectColor(yellowDot);
            }
            
            document.getElementById('stop-selection-ui').classList.remove('hidden-step');
            renderDirectionTabs(); renderStopDropdown();
        }

        function renderDirectionTabs() {
            const container = document.getElementById('direction-tabs');
            if (!container || !window.currentRouteData || !window.currentRouteData.directions) return;
            container.innerHTML = '';
            const directions = window.currentRouteData.directions;
            
            Object.keys(directions).forEach(key => {
                const dir = directions[key];
                let destText = '';
                const langKey = typeof currentLang !== 'undefined' ? currentLang : 'tc';
                
                if (['MTR', 'LRT'].includes(window.currentTransit) && window.MTR_CSV_DICT && window.MTR_CSV_DICT[dir.dest_key]) {
                    destText = window.MTR_CSV_DICT[dir.dest_key][langKey];
                } else if (dir.dest_name && typeof dir.dest_name === 'object') { 
                    destText = dir.dest_name[langKey] || dir.dest_name['tc'] || "未知方向"; 
                } else if (dir.dest_name && typeof dir.dest_name === 'string') { 
                    destText = dir.dest_name; 
                } else { 
                    destText = dir.dest_key || "未知方向"; 
                }
                
                let label = destText;
                
                if (destText !== "未知方向" && !destText.startsWith('往 ') && !destText.toLowerCase().startsWith('to ')) { 
                    label = `${langKey === 'en' ? 'To ' : '往 '}${destText}`; 
                }
                
                const btn = document.createElement('button');
                let transitKey = window.selectedTransit;
                if (destText.includes('(龍運)') || destText.includes('(LWB)')) transitKey = 'LWB';
                if (destText.includes('(港鐵)') || destText.includes('(MTR)')) transitKey = 'MTR'; 

                const themeClasses = { 'BUS': 'text-red-600 border-red-400', 'LWB': 'text-orange-500 border-orange-400', 'GMB': 'text-green-600 border-green-400', 'MTR': 'text-yellow-600 border-yellow-400', 'LRT': 'text-orange-600 border-orange-400' };
                const activeClasses = `bg-white shadow-sm border ${themeClasses[transitKey] || 'text-red-600 border-red-400'}`;
                
                btn.className = `px-4 py-2 text-sm font-bold rounded-md transition shrink-0 whitespace-nowrap snap-start ${window.activeDirection === key ? activeClasses : 'text-gray-500 hover:text-gray-700 hover:bg-gray-200 border border-transparent'}`;
                btn.textContent = label;
                btn.onclick = () => { window.activeDirection = key; renderDirectionTabs(); renderStopDropdown(); };
                container.appendChild(btn);
            });
        }

        async function renderStopDropdown() {
            const stopArea = document.getElementById('stop-selection-ui');
            const select = document.getElementById('stop-select');
            if (!stopArea || !select) return;
            
            const placeholder = typeof getTranslation === 'function' ? getTranslation('selectStop') : '請選擇上車分站...';
            select.innerHTML = `<option value="" disabled selected data-i18n="selectStop">${placeholder}</option>`;
            stopArea.classList.remove('hidden-step');
            document.getElementById('setup-area').classList.add('hidden-step');
            
            if (!window.currentRouteData || !window.currentRouteData.directions || !window.activeDirection) return;
            const dirData = window.currentRouteData.directions[window.activeDirection];
            if (!dirData || !dirData.stops || !Array.isArray(dirData.stops)) return;

            dirData.stops.forEach((stop, index) => {
                let stopName = '';
                const langKey = typeof currentLang !== 'undefined' ? currentLang : 'tc';

                if (['MTR', 'LRT'].includes(window.currentTransit) && window.MTR_CSV_DICT && window.MTR_CSV_DICT[stop.stop_id]) {
                    stopName = window.MTR_CSV_DICT[stop.stop_id][langKey];
                } else if (stop.name_obj && stop.name_obj[langKey]) { 
                    stopName = stop.name_obj[langKey]; 
                } else if (stop.name_tc || stop.name_en) { 
                    stopName = langKey === 'en' ? (stop.name_en || stop.name_tc) : (stop.name_tc || stop.name_en); 
                } else { 
                    stopName = stop.name_key || stop.stop_id || stop.stop || `Stop ${index + 1}`; 
                }
                
                const opt = document.createElement('option');
                opt.value = JSON.stringify(stop); 
                opt.textContent = stopName; 
                select.appendChild(opt);
            });
            if (typeof translatePage === 'function') translatePage();
        }

        function showSetupForm() {
            document.getElementById('setup-area').classList.remove('hidden-step');
            const select = document.getElementById('stop-select');
            
            let localizedRoute = window.currentRouteData.route_key ? (typeof getTranslation === 'function' ? getTranslation(window.currentRouteData.route_key, window.currentRouteData.route) : window.currentRouteData.route) : window.currentRouteData.route;
            if (window.currentRouteData.transitType === 'LRT') localizedRoute = window.currentRouteData.route;
            
            let stopNameLocal = select.options[select.selectedIndex].text; 
            document.getElementById('alias-input').value = `${localizedRoute} (${stopNameLocal})`;
        }

        function checkStep2() { const select = document.getElementById('stop-select'); if(select.value) { showSetupForm(); } else { document.getElementById('setup-area').classList.add('hidden-step'); } }
        function selectColor(element) { document.querySelectorAll('.color-dot').forEach(el => el.classList.remove('selected')); element.classList.add('selected'); window.selectedColor = element.getAttribute('data-color'); }
        
        function saveToDashboard() {
            const select = document.getElementById('stop-select');
            const stopData = JSON.parse(select.value);
            const aliasInput = document.getElementById('alias-input').value.trim();
            const colorMap = { 'red': '#ef4444', 'blue': '#3b82f6', 'green': '#10b981', 'purple': '#8b5cf6', 'orange': '#f97316', 'yellow': '#eab308' };
            
            let localizedRoute = window.currentRouteData.route_key ? (typeof getTranslation === 'function' ? getTranslation(window.currentRouteData.route_key, window.currentRouteData.route) : window.currentRouteData.route) : window.currentRouteData.route;
            if (window.currentRouteData.transitType === 'LRT') localizedRoute = window.currentRouteData.route;
            
            let stopNameLocal = select.options[select.selectedIndex].text;
            const defaultAlias = `${localizedRoute} (${stopNameLocal})`;
            const isCustom = (aliasInput !== defaultAlias && aliasInput !== "");
            const savedAlias = isCustom ? aliasInput : "";

            let finalTransitType = window.currentTransit.toUpperCase();
            if (finalTransitType === 'BUS') {
                const destName = window.currentRouteData.directions[window.activeDirection].dest_name.tc || "";
                if (destName.includes('九巴')) finalTransitType = 'KMB';
                else if (destName.includes('龍運')) finalTransitType = 'LWB';
                else if (destName.includes('城巴')) finalTransitType = 'CTB';
                else if (destName.includes('嶼巴')) finalTransitType = 'NLB';
                else if (destName.includes('港鐵')) finalTransitType = 'MTR'; 
            }

            const newRouteConfig = {
                id: `item_${Date.now()}`, group: window.selectedGroup, transitType: finalTransitType, route: window.currentRouteData.route,
                route_key: window.currentRouteData.route_key || null, stop_id: stopData.stop_id,
                dest_key: window.currentRouteData.directions[window.activeDirection].dest_key || null, dest_name: window.currentRouteData.directions[window.activeDirection].dest_name || null,
                stop_key: stopData.name_key || null, stop_name: stopData.name_obj || null, alias: savedAlias, isCustomAlias: isCustom,
                color: colorMap[window.selectedColor] || '#ef4444', apiUrl: stopData.api_url, time: 'ALL_DAY'
            };
            
            let dashboardRoutes = JSON.parse(localStorage.getItem('hk_transit_routes') || '[]');
            dashboardRoutes.push(newRouteConfig); localStorage.setItem('hk_transit_routes', JSON.stringify(dashboardRoutes));
            window.location.href = 'index.html'; 
        }
    </script>
